services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: startup_news
      POSTGRES_USER: startup_news
      POSTGRES_PASSWORD: startup_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startup_news -d startup_news"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: startup_news
      RABBITMQ_DEFAULT_PASS: startup_news
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --model
      - /models/${LLAMA_CPP_MODEL_FILE:-qwen3-1.7b-q4_k_m.gguf}
      - --alias
      - ${LLAMA_CPP_MODEL:-qwen3-1.7b}
      - --no-cache-prompt
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "4096"
      - -np
      - "1"
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro

  backend-api:
    build:
      context: ./services/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://startup_news:startup_news@postgres:5432/startup_news
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ENABLED_SOURCES: ""
      SOURCE_TIMEOUT_SECONDS: "30"
      SOURCE_USER_AGENT: StartupNewsTracker/1.0 (+https://localhost)
      LLAMA_CPP_BASE_URL: http://llama-cpp:8080/v1
      LLAMA_CPP_MODEL: ${LLAMA_CPP_MODEL:-qwen3-1.7b}
      ENRICHMENT_ENABLED: "true"
      ENRICHMENT_BATCH_SIZE: "10"
      ENRICHMENT_IDLE_INTERVAL_SECONDS: "5"
      ENRICHMENT_JOB_MAX_ATTEMPTS: "3"
      ENRICHMENT_JOB_RETRY_DELAY_SECONDS: "300"
      ENRICHMENT_JOB_STALE_AFTER_SECONDS: "1800"
      RABBITMQ_URL: amqp://startup_news:startup_news@rabbitmq:5672/
      ARTICLE_QUEUE_NAME: article.enrichment
      ARTICLE_QUEUE_MAX_PRIORITY: "255"
      ARTICLE_QUEUE_PREFETCH_COUNT: "1"
      ARTICLE_QUEUE_RETRY_DELAY_SECONDS: "300"
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      llama-cpp:
        condition: service_healthy

  ingester:
    build:
      context: ./services/backend
    command: python -m scripts.ingest --interval 3600
    environment:
      DATABASE_URL: postgresql+asyncpg://startup_news:startup_news@postgres:5432/startup_news
      ENABLED_SOURCES: ""
      SOURCE_TIMEOUT_SECONDS: "30"
      SOURCE_USER_AGENT: StartupNewsTracker/1.0 (+https://localhost)
      ENRICHMENT_JOB_MAX_ATTEMPTS: "3"
      RABBITMQ_URL: amqp://startup_news:startup_news@rabbitmq:5672/
      ARTICLE_QUEUE_NAME: article.enrichment
      ARTICLE_QUEUE_MAX_PRIORITY: "255"
    volumes:
      - ./services/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  enricher:
    build:
      context: ./services/backend
    command: python -m scripts.enrich
    environment:
      DATABASE_URL: postgresql+asyncpg://startup_news:startup_news@postgres:5432/startup_news
      SOURCE_TIMEOUT_SECONDS: "30"
      SOURCE_USER_AGENT: StartupNewsTracker/1.0 (+https://localhost)
      LLAMA_CPP_BASE_URL: http://llama-cpp:8080/v1
      LLAMA_CPP_MODEL: ${LLAMA_CPP_MODEL:-qwen3-1.7b}
      ENRICHMENT_ENABLED: "true"
      ENRICHMENT_BATCH_SIZE: "10"
      ENRICHMENT_IDLE_INTERVAL_SECONDS: "5"
      ENRICHMENT_JOB_MAX_ATTEMPTS: "3"
      ENRICHMENT_JOB_RETRY_DELAY_SECONDS: "300"
      ENRICHMENT_JOB_STALE_AFTER_SECONDS: "1800"
      RABBITMQ_URL: amqp://startup_news:startup_news@rabbitmq:5672/
      ARTICLE_QUEUE_NAME: article.enrichment
      ARTICLE_QUEUE_MAX_PRIORITY: "255"
      ARTICLE_QUEUE_PREFETCH_COUNT: "1"
      ARTICLE_QUEUE_RETRY_DELAY_SECONDS: "300"
    volumes:
      - ./services/backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      llama-cpp:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  migrate:
    build:
      context: ./services/backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://startup_news:startup_news@postgres:5432/startup_news
    volumes:
      - ./services/backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./services/dashboard
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./services/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    depends_on:
      backend-api:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:
  dashboard_node_modules:
